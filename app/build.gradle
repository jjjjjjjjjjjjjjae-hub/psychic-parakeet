plugins {
    id 'com.android.application'
}

android {
    namespace 'com.vortex.sys.service'
    compileSdk 34

    defaultConfig {
        applicationId "com.vortex.sys.service"
        minSdk 26
        targetSdk 34
        versionCode 1
        versionName "2.0"
    }

    buildTypes {
        release {
            minifyEnabled true
            shrinkResources true
            proguardFiles getDefaultProguardFile('proguard-android-optimize.txt'), 'proguard-rules.pro'
        }
    }
}
